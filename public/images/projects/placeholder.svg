<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="In the works — placeholder">
  <rect width="1200" height="900" fill="#faf9f5"/>
  <!-- faint blueprint ruling -->
  <g stroke="#161616" stroke-width="1" opacity="0.05">
    <path d="M0 150H1200M0 300H1200M0 450H1200M0 600H1200M0 750H1200"/>
    <path d="M150 0V900M300 0V900M450 0V900M600 0V900M750 0V900M900 0V900M1050 0V900"/>
  </g>
  <!-- dashed studio frame -->
  <rect x="60" y="60" width="1080" height="780" fill="none" stroke="#161616" stroke-opacity="0.35" stroke-width="3" stroke-dasharray="14 12" rx="6"/>
  <!-- pencil doodle -->
  <g transform="translate(600 360) rotate(-18)" fill="none" stroke="#161616" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-24" y="-150" width="48" height="250" rx="6" fill="#e3a92f" fill-opacity="0.9" stroke-width="6"/>
    <path d="M-24 100 L0 150 L24 100 Z" fill="#161616" stroke="none"/>
    <path d="M-24 70 H24" stroke-width="5"/>
    <path d="M-24 -150 H24" stroke-width="6"/>
  </g>
  <!-- labels -->
  <text x="600" y="600" text-anchor="middle" fill="#161616" font-family="'Space Mono', ui-monospace, monospace" font-size="58" font-weight="700" letter-spacing="10">IN THE WORKS</text>
  <text x="600" y="660" text-anchor="middle" fill="#161616" fill-opacity="0.55" font-family="'Space Mono', ui-monospace, monospace" font-size="26" letter-spacing="6">THE REAL PROJECT LANDS HERE SOON</text>
  <!-- corner stamp -->
  <g transform="translate(980 760) rotate(-8)">
    <rect x="-92" y="-34" width="184" height="68" fill="none" stroke="#d8365d" stroke-width="4" rx="6"/>
    <text x="0" y="10" text-anchor="middle" fill="#d8365d" font-family="'Space Mono', ui-monospace, monospace" font-size="30" font-weight="700" letter-spacing="6">DRAFT</text>
  </g>
</svg>
